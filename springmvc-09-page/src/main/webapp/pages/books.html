<!DOCTYPE html><html>    <head>        <!-- 页面meta -->        <meta charset="utf-8">        <meta http-equiv="X-UA-Compatible" content="IE=edge">        <title>SpringMVC案例</title>        <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport">        <!-- 引入样式 -->        <link rel="stylesheet" href="../plugins/elementui/index.css">        <link rel="stylesheet" href="../plugins/font-awesome/css/font-awesome.min.css">        <link rel="stylesheet" href="../css/style.css">    </head>    <body class="hold-transition">        <div id="app">            <div class="content-header">                <h1>图书管理</h1>            </div>            <div class="app-container">                <div class="box">                    <div class="filter-container">                        <el-input placeholder="图书名称" v-model="pagination.queryString" style="width: 200px;" class="filter-item"></el-input>                        <el-button @click="getAll()" class="dalfBut">查询</el-button>                        <el-button type="primary" class="butT" @click="handleCreate()">新建</el-button>                    </div>                    <el-table size="small" current-row-key="id" :data="dataList" stripe highlight-current-row>                        <el-table-column type="index" align="center" label="序号"></el-table-column>                        <el-table-column prop="type" label="图书类别" align="center"></el-table-column>                        <el-table-column prop="name" label="图书名称" align="center"></el-table-column>                        <el-table-column prop="description" label="描述" align="center"></el-table-column>                        <el-table-column label="操作" align="center">                            <template slot-scope="scope">                                <el-button type="primary" size="mini" @click="handleUpdate(scope.row)">编辑</el-button>                                <el-button type="danger" size="mini" @click="handleDelete(scope.row)">删除</el-button>                            </template>                        </el-table-column>                    </el-table>                    <!-- 新增标签弹层 -->                    <div class="add-form">                        <el-dialog title="新增图书" :visible.sync="dialogFormVisible">                            <el-form ref="dataAddForm" :model="formData" :rules="rules" label-position="right" label-width="100px">                                <el-row>                                    <el-col :span="12">                                        <el-form-item label="图书类别" prop="type">                                            <el-input v-model="formData.type"/>                                        </el-form-item>                                    </el-col>                                    <el-col :span="12">                                        <el-form-item label="图书名称" prop="name">                                            <el-input v-model="formData.name"/>                                        </el-form-item>                                    </el-col>                                </el-row>                                <el-row>                                    <el-col :span="24">                                        <el-form-item label="描述">                                            <el-input v-model="formData.description" type="textarea"></el-input>                                        </el-form-item>                                    </el-col>                                </el-row>                            </el-form>                            <div slot="footer" class="dialog-footer">                                <el-button @click="dialogFormVisible = false">取消</el-button>                                <el-button type="primary" @click="handleAdd()">确定</el-button>                            </div>                        </el-dialog>                    </div>                    <!-- 编辑标签弹层 -->                    <div class="add-form">                        <el-dialog title="编辑检查项" :visible.sync="dialogFormVisible4Edit">                            <el-form ref="dataEditForm" :model="formData" :rules="rules" label-position="right" label-width="100px">                                <el-row>                                    <el-col :span="12">                                        <el-form-item label="图书类别" prop="type">                                            <el-input v-model="formData.type"/>                                        </el-form-item>                                    </el-col>                                    <el-col :span="12">                                        <el-form-item label="图书名称" prop="name">                                            <el-input v-model="formData.name"/>                                        </el-form-item>                                    </el-col>                                </el-row>                                <el-row>                                    <el-col :span="24">                                        <el-form-item label="描述">                                            <el-input v-model="formData.description" type="textarea"></el-input>                                        </el-form-item>                                    </el-col>                                </el-row>                            </el-form>                            <div slot="footer" class="dialog-footer">                                <el-button @click="dialogFormVisible4Edit = false">取消</el-button>                                <el-button type="primary" @click="handleEdit()">确定</el-button>                            </div>                        </el-dialog>                    </div>                </div>            </div>        </div>    </body>    <!-- 引入组件库 -->    <script src="../js/vue.js"></script>    <script src="../plugins/elementui/index.js"></script>    <script type="text/javascript" src="../js/jquery.min.js"></script>    <script src="../js/axios-0.18.0.js"></script>    <script>        var vue = new Vue({            el: '#app',            data:{                pagination: {},				dataList: [],//当前页要展示的列表数据                formData: {},//表单数据                dialogFormVisible: false,//控制表单是否可见                dialogFormVisible4Edit:false,//编辑表单是否可见                rules: {//校验规则                    type: [{ required: true, message: '图书类别为必填项', trigger: 'blur' }],                    name: [{ required: true, message: '图书名称为必填项', trigger: 'blur' }]                }            },            //钩子函数，VUE对象初始化完成后自动执行            created() {                this.getAll();            },            methods: {                getBasePath() {                    let pathname = window.location.pathname; // 例如 "/springmvc-06-rest-case/pages/books.html"                    let idx = pathname.indexOf('/', 1);      // 从索引1开始找第二个 '/' 的位置                    return idx > 0 ? pathname.substring(0, idx) : '';                },                //列表                getAll() {                    let base = this.getBasePath();                    axios.get(base+"/books").then((res)=>{                        this.dataList = res.data.data;                    })                },                //弹出添加窗口                handleCreate() {                    this.resetForm();                    this.dialogFormVisible=true;                },                //重置表单                resetForm() {                    this.formData = {                        type: '',                        name: '',                        description: ''                    };                },                //添加                handleAdd () {                    let base = this.getBasePath();                    axios.post(base+"/books",this.formData).then((res)=>{                        if(res.data.code == 20011){                            //如果操作成功，关闭弹层，显示数据                            this.dialogFormVisible = false;                            this.$message.success("添加成功");                        }else if(res.data.code == 20010){                            //操作失败                            this.$message.error(res.data.msg);                        }else{                            //系统问题                            this.$message.error(res.data.msg);                        }                    }).finally((res)=>{                        //不管是否成功都加载数据                        this.getAll();                    })                },                //弹出编辑窗口                handleUpdate(row) {                    //查询数据根据id查询                    let base = this.getBasePath();                    axios.get(base+"/books/"+row.id).then((res)=>{                        console.log(res.data);                        console.log(Error);                        if(res.data.code == 20041){                            this.formData = res.data.data;                            //显示弹层，加载数据                            this.dialogFormVisible4Edit = true;                        }else{                            this.$message.error(res.data.msg);                        }                    })                },                //编辑                handleEdit() {                    let base = this.getBasePath();                    axios.put(base+"/books",this.formData).then((res)=>{                        if(res.data.code == 20031){                            //如果操作成功，关闭弹层，显示数据                            this.dialogFormVisible4Edit = false;                            this.$nextTick(() => {                                if (this.$message) this.$message.success("修改成功");                            });                        }else if(res.data.code == 20030){                            //操作失败                            this.$message.error(res.data.msg);                        }else{                            //系统问题                            this.$message.error(res.data.msg);                        }                    }).finally(()=>{                        this.getAll();                    })                },                // 删除                handleDelete(row) {                    //1.弹出提示框                    this.$confirm("此操作永久不可恢复，是否继续？","警告",{                        type:'warning'                    }).then(()=>{                        //执行删除操作                        let base = this.getBasePath();                        axios.delete(base+"/books/"+row.id).then((res)=>{                            console.log(res.data);                            if(res.data.code == 20031){                                this.$message.success("删除成功！");                                this.getAll();                            }else{                                this.$message.error("删除失败！");                            }                        })                    }).catch(()=>{                        //取消删除                        this.$message.info("取消删除操作！");                    })                }            }        })    </script></html>
